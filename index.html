        { ref: '/webpage/references/backyard_playground_set.jpg',   glb: '/webpage/gallery/backyard_playground_set.glb',   name: 'Backyard Playground Set' },
        { ref: '/webpage/references/eames_lounge.jpg',              glb: '/webpage/gallery/eames_lounge.glb',              name: 'Eames Lounge' },
        { ref: '/webpage/references/27_penny_farthing.jpg',         glb: '/webpage/gallery/27_penny_farthing.glb',         name: 'Penny-Farthing' },
        // Row 2
        { ref: '/webpage/references/game_boy.jpg',                  glb: '/webpage/gallery/game_boy.glb',                  name: 'Game Boy' },
        { ref: '/webpage/references/03_nintendo_ds_lite.jpg',       glb: '/webpage/gallery/03_nintendo_ds_lite.glb',       name: 'Nintendo DS Lite' },
        { ref: '/webpage/references/pixar.jpg',                     glb: '/webpage/gallery/pixar.glb',                     name: 'Pixar Lamp' },
        // Row 3
        { ref: '/webpage/references/fidget_spinner.jpg',            glb: '/webpage/gallery/fidget_spinner.glb',            name: 'Fidget Spinner' },
        { ref: '/webpage/references/wooden_mannequin.jpg',          glb: '/webpage/gallery/wooden_mannequin.glb',          name: 'Wooden Mannequin' },
        { ref: '/webpage/references/chinese_carved_wooden_fan.jpg', glb: '/webpage/gallery/chinese_carved_wooden_fan.glb', name: 'Chinese Carved Wooden Fan' },
      ];

      const HDR_URL = '/webpage/gallery/studio_1k.hdr';
      const ENV_INTENSITY = 1.1;

      // Honor prefers-reduced-motion for the 3D viewer auto-rotate.
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

      // Shared HDR env across all viewer instances.
      let sharedEnvTexture = null;
      let sharedEnvPromise = null;
      function getEnv(renderer) {
        if (sharedEnvTexture) return Promise.resolve(sharedEnvTexture);
        if (sharedEnvPromise) return sharedEnvPromise;
        sharedEnvPromise = new Promise((resolve, reject) => {
          new RGBELoader().load(HDR_URL, (hdrTex) => {
            const pmrem = new THREE.PMREMGenerator(renderer);
            pmrem.compileEquirectangularShader();
            sharedEnvTexture = pmrem.fromEquirectangular(hdrTex).texture;
            hdrTex.dispose();
            pmrem.dispose();
            resolve(sharedEnvTexture);
          }, undefined, reject);
        });
        return sharedEnvPromise;
      }

      const gltfLoader = new GLTFLoader();

      class PairViewer {
        constructor(viewerEl, glbUrl, cardEl) {
          this.viewerEl = viewerEl;
          this.glbUrl = glbUrl;
          this.cardEl = cardEl;
          this.loadingEl = viewerEl.querySelector('.img2gen-loading');
          this.playBtn = cardEl ? cardEl.querySelector('[data-play]') : null;
          this.playing = true;
          if (this.playBtn) {
            this.playBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              this.togglePlay();
            });
          }
          this.observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
              this.observer.disconnect();
              this.initScene();
              this.loadModel();
            }
          }, { rootMargin: '300px' });
          this.observer.observe(viewerEl);
        }

        togglePlay() {
          this.playing = !this.playing;
          if (this.mixer) {
            // Animated: pause/resume all actions.
            this.mixer._actions.forEach((a) => a.paused = !this.playing);
          }
          if (this.controls) {
            this.controls.autoRotate = this.playing && !this.mixer && !reduceMotion.matches;
          }
          if (this.playBtn) {
            this.playBtn.classList.toggle('paused', !this.playing);
            this.playBtn.querySelector('.ico-pause').style.display = this.playing ? 'block' : 'none';
            this.playBtn.querySelector('.ico-play').style.display = this.playing ? 'none' : 'block';
            this.playBtn.setAttribute('aria-label', this.playing ? 'Pause animation' : 'Play animation');
          }
        }

        initScene() {
          const w = this.viewerEl.clientWidth;
          const h = this.viewerEl.clientHeight;

          this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
          this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          this.renderer.setSize(w, h);
          this.renderer.outputColorSpace = THREE.SRGBColorSpace;
          this.renderer.toneMapping = THREE.NeutralToneMapping;
          this.renderer.toneMappingExposure = 1.3;
          this.viewerEl.appendChild(this.renderer.domElement);

          this.scene = new THREE.Scene();
          this.scene.environmentIntensity = ENV_INTENSITY;
          getEnv(this.renderer).then((envTex) => { this.scene.environment = envTex; });

          this.camera = new THREE.PerspectiveCamera(35, w / h, 0.01, 1000);
          this.camera.position.set(2, 1.5, 3);

          const key = new THREE.DirectionalLight(0xffffff, 1.0);
          key.position.set(5, 8, 6);
          this.scene.add(key);
          const fill = new THREE.DirectionalLight(0xfff2e0, 0.5);
          fill.position.set(-6, 4, 3);
          this.scene.add(fill);
          const rim = new THREE.DirectionalLight(0xb8c8ff, 0.5);
          rim.position.set(0, 4, -8);
          this.scene.add(rim);
          const hemi = new THREE.HemisphereLight(0xffffff, 0xb8b8c8, 0.3);
          this.scene.add(hemi);

          this.controls = new OrbitControls(this.camera, this.renderer.domElement);
          this.controls.enableDamping = true;
          this.controls.dampingFactor = 0.08;
          this.controls.minDistance = 0.1;
          this.controls.maxDistance = 100;
          this.controls.autoRotateSpeed = 0.6;

          this.clock = new THREE.Clock();

          this.resizeObserver = new ResizeObserver(() => this.onResize());
          this.resizeObserver.observe(this.viewerEl);

          this.animate();
        }

        onResize() {
          const w = this.viewerEl.clientWidth;
          const h = this.viewerEl.clientHeight;
          if (!w || !h) return;
          this.renderer.setSize(w, h);
          this.camera.aspect = w / h;
          this.camera.updateProjectionMatrix();
        }

        loadModel() {
          gltfLoader.load(
            this.glbUrl,
            (gltf) => this.onLoaded(gltf),
            (progress) => {
              if (progress.lengthComputable) {
                const pct = Math.round((progress.loaded / progress.total) * 100);
                const span = this.loadingEl.querySelector('span');
                if (span) span.textContent = `Loading… ${pct}%`;
              }
            },
            (err) => {
              console.error('Load failed', this.glbUrl, err);
              this.loadingEl.innerHTML = '<span style="color:#a55">Failed to load</span>';
            },
          );
        }

        onLoaded(gltf) {
          this.model = gltf.scene;

          this.model.traverse((obj) => {
            if (obj.isMesh && obj.material) {
              const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
              for (const m of mats) {
                if ('envMapIntensity' in m) m.envMapIntensity = ENV_INTENSITY;
                if (m.normalMap)    m.normalMap.colorSpace = THREE.NoColorSpace;
                if (m.metalnessMap) m.metalnessMap.colorSpace = THREE.NoColorSpace;
                if (m.roughnessMap) m.roughnessMap.colorSpace = THREE.NoColorSpace;
                if (m.aoMap)        m.aoMap.colorSpace = THREE.NoColorSpace;
                if (m.map)          m.map.colorSpace = THREE.SRGBColorSpace;
                if (m.emissiveMap)  m.emissiveMap.colorSpace = THREE.SRGBColorSpace;
                m.needsUpdate = true;
              }
            }
          });

          const box = new THREE.Box3().setFromObject(this.model);
          const size = new THREE.Vector3(); box.getSize(size);
          const center = new THREE.Vector3(); box.getCenter(center);
          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const scale = 2.0 / maxDim;
          this.model.scale.setScalar(scale);
          this.model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
          this.scene.add(this.model);

          const sb = new THREE.Box3().setFromObject(this.model);
          const ss = new THREE.Vector3(); sb.getSize(ss);
          const radius = ss.length() * 0.5;
          const fovRad = (this.camera.fov * Math.PI) / 180;
          const dist = (radius / Math.sin(fovRad / 2)) * 0.9;
          this.camera.position.set(dist * 0.7, dist * 0.55, dist * 0.85);
          this.controls.target.set(0, 0, 0);
          this.controls.update();

          if (gltf.animations && gltf.animations.length > 0) {
            this.mixer = new THREE.AnimationMixer(this.model);
            gltf.animations.forEach((c) => this.mixer.clipAction(c).play());
            if (reduceMotion.matches) {
              this.mixer._actions.forEach((a) => a.paused = true);
              this.playing = false;
              if (this.playBtn) {
                this.playBtn.classList.add('paused');
                this.playBtn.querySelector('.ico-pause').style.display = 'none';
                this.playBtn.querySelector('.ico-play').style.display = 'block';
                this.playBtn.setAttribute('aria-label', 'Play animation');
              }
            }
          } else {
            this.controls.autoRotate = !reduceMotion.matches;
          }

          this.loadingEl.classList.add('hidden');
        }

        animate() {
          this.rafId = requestAnimationFrame(() => this.animate());
          const dt = this.clock.getDelta();
          if (this.mixer) this.mixer.update(dt);
          this.controls.update();
          this.renderer.render(this.scene, this.camera);
        }
      }

      // ── Build the replacement block ──────────────────────────────────
      function buildBlock() {
        const frag = htmlToFragment(`

                  <svg class="ico-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none;margin-left:2px;" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>

      // ── Scene-reconstruction block ──────────────────────────────────
      const SCENES = [
        {
          id: 'darwin', name: 'Darwin Bedroom',
          scan:       '/webpage/scene_recon/Darwin_BedRoom_scan.mp4',
          flythrough: '/webpage/scene_recon/Darwin_BedRoom_flythrough.mp4',

      function buildSceneBlock() {
        const frag = htmlToFragment(`
          <h3><span translate="no">Articraft</span> in Scene-Level Reconstruction</h3>
          <p class="app-desc">
            By integrating <span translate="no">Articraft</span> into the <a href="https://litereality.github.io/" target="_blank" rel="noopener" translate="no">LiteReality</a>
            pipeline, we obtain fully interactive scene reconstructions: from commodity scanner input, we produce a complete,

                <line x1="2" y1="11" x2="58" y2="11"/>

        const scanVideo = frag.querySelector('[data-scene-scan]');

        function selectScene(id) {
          const scene = SCENES.find((s) => s.id === id) || SCENES[0];
          scanVideo.src = scene.scan;
          scanVideo.load();
          scanVideo.play().catch(() => {});
          flyVideo.src = scene.flythrough;
          flyVideo.load();
          flyVideo.play().catch(() => {});

            const isActive = t.dataset.scene === id;

        thumbs.forEach((t) => {

          const v = t.querySelector('video');
          if (v) {

        selectScene(SCENES[0].id);
        return frag;
      }

      function buildVRBlock() {
        return htmlToFragment(`

          <p class="app-desc"><span translate="no">Articraft</span> generates assets and scenes that can be loaded directly into VR for hands-on interaction. Every articulated object responds to the user, with PBR materials preserved.</p>

      let img2genInstalled   = false;
      let sceneInstalled     = false;
      let roboticsInstalled  = false;
      let appsReordered      = false;
      let actionReordered    = false;
      let vrInstalled        = false;

      function hideVideoControls(root = document) {
        const videos = root.querySelectorAll ? root.querySelectorAll('video') : [];
        videos.forEach((video) => {
          video.controls = false;
          video.removeAttribute('controls');
          video.setAttribute('controlsList', 'nodownload nofullscreen noremoteplayback');
          video.disablePictureInPicture = true;
          video.playsInline = true;
        });
      }

      function installMobileNavCollapse() {
        const nav = document.querySelector('.site-nav');
        if (!nav || nav.dataset.mobileCollapseInstalled === '1') return;
        nav.dataset.mobileCollapseInstalled = '1';

        const mobileQuery = window.matchMedia('(max-width: 680px)');
        let lastY = window.scrollY || 0;
        let ticking = false;

        function update() {
          ticking = false;
          const y = window.scrollY || 0;
          const delta = y - lastY;
          if (!mobileQuery.matches || y < 24 || delta < -4) {
            nav.classList.remove('nav-compact');
          } else if (delta > 4) {
            nav.classList.add('nav-compact');
          }
          lastY = y;
        }

        function requestUpdate() {
          if (ticking) return;
          ticking = true;
          window.requestAnimationFrame(update);
        }

        window.addEventListener('scroll', requestUpdate, { passive: true });
        if (typeof mobileQuery.addEventListener === 'function') {
          mobileQuery.addEventListener('change', requestUpdate);
        } else if (typeof mobileQuery.addListener === 'function') {
          mobileQuery.addListener(requestUpdate);
        }
        update();
      }

      function moveActionAfterApplications() {
        if (actionReordered) return;
        const demosSection = document.getElementById('demos');
        const actionSection = document.getElementById('generation');
        if (!demosSection || !actionSection || !demosSection.parentNode) return;
        demosSection.parentNode.insertBefore(actionSection, demosSection.nextSibling);

        const nav = document.querySelector('.site-nav nav');
        if (nav) {
          const actionLink = nav.querySelector('a[href="#generation"]');
          const demosLink = nav.querySelector('a[href="#demos"]');
          if (actionLink && demosLink) nav.insertBefore(actionLink, demosLink.nextSibling);
        }

        actionReordered = true;
      }

      function reorderApplications() {
        if (appsReordered) return;
        const demosSection = document.getElementById('demos');
        if (!demosSection) return;
        // Find the three existing demo-blocks by title text.
        const blocks = Array.from(demosSection.querySelectorAll('.demo-block'));
        if (blocks.length < 3) return;
        const find = (...terms) => blocks.find((b) => terms.some((t) => (b.textContent || '').includes(t)));
        const imgB = find('Image-Conditioned Generation with Articraft', 'Articulated 3D Object Generation from Images');
        const sceB = find('Articraft in Scene-Level Reconstruction', 'Room-Level Scene Reconstruction');
        const robB = find('Robotic Simulation with Articraft Assets', 'Robotics Simulation');
        if (!imgB || !sceB || !robB) return;
        // Re-append in the desired order: image → scene → robotics.
        const parent = imgB.parentNode;
        parent.appendChild(imgB);
        parent.appendChild(sceB);
        parent.appendChild(robB);
        appsReordered = true;
      }

      function installVR() {
        if (vrInstalled) return;
        const demosSection = document.getElementById('demos');
        if (!demosSection) return;
        // Avoid duplicate installs.
        if (demosSection.querySelector('[data-vr-block]')) { vrInstalled = true; return; }
        const oldVR = Array.from(demosSection.querySelectorAll('.demo-block'))
          .find((b) => (b.textContent || '').includes('Creating Interactive Scenes for VR'));
        if (oldVR) oldVR.remove();
        const robB = Array.from(demosSection.querySelectorAll('.demo-block'))
          .find((b) => {
            const text = b.textContent || '';
            return text.includes('Robotic Simulation with Articraft Assets') || text.includes('Robotics Simulation');
          });
        if (!robB) return;
        const vrWrap = document.createElement('div');
        vrWrap.className = 'demo-block';
        vrWrap.dataset.vrBlock = '1';
        vrWrap.appendChild(buildVRBlock());
        robB.parentNode.insertBefore(vrWrap, robB.nextSibling);
        vrInstalled = true;
      }

      function tryInstall() {
        if (!img2genInstalled) {
          const t = findBlockByText('Articulated 3D Object Generation from Images') || findBlockByText('Image-Conditioned Generation with Articraft');
          if (t) {
            t.innerHTML = '';
            t.appendChild(buildBlock());
            t.dataset.img2genInstalled = '1';
            img2genInstalled = true;
          }
        }
        if (!sceneInstalled) {
          const t = findBlockByText('Room-Level Scene Reconstruction') || findBlockByText('Articraft in Scene-Level Reconstruction');
          if (t) {
            t.innerHTML = '';
            t.appendChild(buildSceneBlock());
            t.dataset.sceneInstalled = '1';
            sceneInstalled = true;
          }
        }
        if (!roboticsInstalled) {
          const t = findBlockByText('Robotics Simulation') || findBlockByText('Robotic Simulation with Articraft Assets');
          if (t) {
            t.innerHTML = '';
            t.appendChild(buildRoboticsBlock());
            t.dataset.roboticsInstalled = '1';
            roboticsInstalled = true;
          }
        }
        reorderApplications();
        installVR();
        moveActionAfterApplications();
        installMobileNavCollapse();
        hideVideoControls();
      }

      const mo = new MutationObserver(() => {
        hideVideoControls();
        if (!img2genInstalled || !sceneInstalled || !roboticsInstalled || !appsReordered || !vrInstalled || !actionReordered) {
          tryInstall();
        } else {
          const a = findBlockByText('Articulated 3D Object Generation from Images') || findBlockByText('Image-Conditioned Generation with Articraft');
          if (a && !a.dataset.img2genInstalled) { img2genInstalled = false; }
          const b = findBlockByText('Room-Level Scene Reconstruction') || findBlockByText('Articraft in Scene-Level Reconstruction');
          if (b && !b.dataset.sceneInstalled) { sceneInstalled = false; }
          const c = findBlockByText('Robotic');
          if (c && !c.dataset.roboticsInstalled) { roboticsInstalled = false; }
          const demosSection = document.getElementById('demos');
          if (demosSection && !demosSection.querySelector('[data-vr-block]')) vrInstalled = false;
          const actionSection = document.getElementById('generation');
          if (demosSection && actionSection && actionSection.previousElementSibling !== demosSection) actionReordered = false;
          if (!img2genInstalled || !sceneInstalled || !roboticsInstalled || !vrInstalled || !actionReordered) tryInstall();
        }
      });
      mo.observe(document.body, { childList: true, subtree: true });
      document.addEventListener('DOMContentLoaded', tryInstall);
      hideVideoControls();
      tryInstall();
    </script>
  </body>
</html>
